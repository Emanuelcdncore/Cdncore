services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: cdnlandings
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/database:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    mem_limit: 512M

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL_CDNLANDINGS: postgresql://postgres:postgres@postgres:5432/cdnlandings
    volumes:
      - ./database:/database:ro
    entrypoint: ["/bin/sh", "-c", "cd / && /database/migrate-all.sh"]
    restart: "no"
    profiles:
      - migration

  cdncore:
    build:
      context: .
      dockerfile: apps/cdncore/Dockerfile
    expose:
      - "3000"
    restart: unless-stopped
    mem_limit: 512M

  cdntek:
    build:
      context: .
      dockerfile: apps/cdntek/Dockerfile
    expose:
      - "3000"
    restart: unless-stopped
    mem_limit: 512M

  cdntv:
    build:
      context: .
      dockerfile: apps/cdntv/Dockerfile
    expose:
      - "3000"
    restart: unless-stopped
    mem_limit: 512M

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/cloudflare.conf:/etc/nginx/cloudflare.conf:ro
      - ./deploy/nginx/sites:/etc/nginx/sites:ro
    depends_on:
      - cdncore
      - cdntek
      - cdntv
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    mem_limit: 128M

volumes:
  postgres_data:
