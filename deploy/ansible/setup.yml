---
- name: Setup CDN Landings Server
  hosts: webservers
  become: true
  vars_files:
    - group_vars/all.yml

  tasks:
    # ── OS packages ──
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install essential packages
      apt:
        name:
          - curl
          - wget
          - htop
          - vim
          - rsync
          - logrotate
          - unattended-upgrades
          - ca-certificates
          - gnupg
        state: present

    - name: Enable automatic security updates
      copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";

    # ── Swap (2GB) ──
    - name: Create swap file
      command: fallocate -l 2G /swapfile
      args:
        creates: /swapfile

    - name: Set swap permissions and enable
      shell: |
        chmod 600 /swapfile
        mkswap /swapfile
        swapon /swapfile
      when: ansible_swaptotal_mb == 0

    - name: Persist swap in fstab
      lineinfile:
        path: /etc/fstab
        line: "/swapfile none swap sw 0 0"
        state: present

    - name: Set swappiness to 10
      sysctl:
        name: vm.swappiness
        value: '10'
        state: present

    # ── Docker CE ──
    - name: Check if Docker is installed
      command: docker --version
      register: docker_check
      ignore_errors: true
      changed_when: false

    - name: Install Docker (if not present)
      when: docker_check.rc != 0
      block:
        - name: Create keyrings directory
          file:
            path: /etc/apt/keyrings
            state: directory
            mode: '0755'

        - name: Download Docker GPG key
          get_url:
            url: https://download.docker.com/linux/ubuntu/gpg
            dest: /etc/apt/keyrings/docker.asc
            mode: '0644'

        - name: Add Docker repository
          copy:
            dest: /etc/apt/sources.list.d/docker.list
            content: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable\n"

        - name: Update apt cache after Docker repo
          apt:
            update_cache: yes

        - name: Install Docker packages
          apt:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-compose-plugin
            state: present

    - name: Configure Docker daemon (log rotation)
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            },
            "storage-driver": "overlay2"
          }
      notify: restart docker

    - name: Ensure Docker is running
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add deploy user to docker group
      user:
        name: "{{ deploy_user }}"
        groups: docker
        append: yes

    - name: Weekly Docker prune cron
      cron:
        name: "docker system prune"
        special_time: weekly
        job: "docker system prune -af >> /var/log/docker-prune.log 2>&1"

    # ── App directory ──
    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        recurse: yes

  handlers:
    - name: restart docker
      systemd:
        name: docker
        state: restarted
