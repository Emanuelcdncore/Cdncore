upstream loritalk {
    server loritalk:3000 max_fails=3 fail_timeout=5s;
}

server {
    listen 80;
    server_name lori-talk.eu;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        limit_req zone=web_limit burst=60 nodelay;
        proxy_pass http://loritalk;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 10M;

        error_page 502 503 504 @updating;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
        access_log off;
    }

    location @updating {
        default_type text/html;
        return 503 '<!DOCTYPE html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="5"><title>Updating</title><style>body{background:#000;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:system-ui}div{text-align:center}h1{font-size:1.5rem;margin-bottom:.5rem}p{color:#888;font-size:.9rem}</style></head><body><div><h1>Updating...</h1><p>The page will refresh automatically in a few seconds.</p></div></body></html>';
    }
}
