# CI/CD Pipeline
name: Deploy to Production

on:
  push:
    branches:
      - main

env:
  PROJECT_NAME: cdn-landings
  APP_DIR: /opt/cdn-landings
  ALL_APPS: cdncore cdntek cdntv cdnglobal aiaccountant

jobs:
  deploy:
    runs-on: host
    timeout-minutes: 30

    steps:
      # ─── Checkout ───
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── Detect changed apps ───
      - name: Detect changed apps
        id: changes
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")

          # If we can't diff (first commit, etc), deploy all
          if [ -z "$CHANGED_FILES" ]; then
            echo "APPS=cdncore cdntek cdntv cdnglobal aiaccountant" >> "$GITHUB_OUTPUT"
            echo "INFRA=true" >> "$GITHUB_OUTPUT"
            echo "Deploy all (no diff available)"
            exit 0
          fi

          APPS=""
          INFRA=false

          # Check each app
          for app in cdncore cdntek cdntv cdnglobal aiaccountant; do
            if echo "$CHANGED_FILES" | grep -q "^apps/${app}/"; then
              APPS="$APPS $app"
            fi
          done

          # Shared packages trigger all apps
          if echo "$CHANGED_FILES" | grep -q "^packages/"; then
            APPS="cdncore cdntek cdntv cdnglobal aiaccountant"
          fi

          # Infra changes (docker-compose, nginx, deploy, workflow, database)
          if echo "$CHANGED_FILES" | grep -qE "^(deploy/|nginx/|docker-compose|database/|\.forgejo/)"; then
            INFRA=true
          fi

          APPS=$(echo "$APPS" | xargs)
          echo "APPS=$APPS" >> "$GITHUB_OUTPUT"
          echo "INFRA=$INFRA" >> "$GITHUB_OUTPUT"
          echo "Changed apps: ${APPS:-none}"
          echo "Infra changed: $INFRA"

      # ─── Setup SSH ───
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config <<SSHEOF
          Host prod
            HostName ${{ secrets.DEPLOY_HOST }}
            User ${{ secrets.DEPLOY_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          SSHEOF
          chmod 600 ~/.ssh/config

      - name: Verify SSH connection
        run: ssh prod "echo 'SSH connection OK'"

      # ─── Build changed Docker images ───
      - name: Build changed apps
        if: steps.changes.outputs.APPS != ''
        run: |
          for app in ${{ steps.changes.outputs.APPS }}; do
            echo "=== Building ${app} ==="
            docker compose -p $PROJECT_NAME \
              -f deploy/docker-compose.prod.yml \
              --project-directory . \
              build ${app}
          done

      # ─── Save and transfer images ───
      - name: Save and transfer images
        if: steps.changes.outputs.APPS != ''
        run: |
          mkdir -p /tmp/cdn-images
          for svc in ${{ steps.changes.outputs.APPS }}; do
            echo "=== Saving ${svc} ==="
            docker save "${PROJECT_NAME}-${svc}" | gzip > "/tmp/cdn-images/${svc}.tar.gz"
            ls -lh "/tmp/cdn-images/${svc}.tar.gz"

            echo "=== Transferring ${svc} ==="
            scp "/tmp/cdn-images/${svc}.tar.gz" prod:/tmp/${svc}.tar.gz
          done

      # ─── Sync project files ───
      - name: Sync project files to production
        run: |
          rsync -az --delete \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=.next \
            --exclude=.claude \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${APP_DIR}/

      # ─── Prepare production configs ───
      - name: Prepare production configs
        run: |
          ssh prod "cp ${APP_DIR}/deploy/docker-compose.prod.yml ${APP_DIR}/docker-compose.yml"

      # ─── Load images on production ───
      - name: Load Docker images
        if: steps.changes.outputs.APPS != ''
        run: |
          for svc in ${{ steps.changes.outputs.APPS }}; do
            echo "=== Loading ${svc} ==="
            ssh prod "gunzip -c /tmp/${svc}.tar.gz | docker load"
            ssh prod "rm -f /tmp/${svc}.tar.gz"
          done

      # ─── Database: postgres + migrations ───
      - name: Start postgres and run migrations
        run: |
          ssh prod "cd ${APP_DIR} && docker compose up -d postgres"

          echo "Waiting for PostgreSQL..."
          for i in $(seq 1 30); do
            if ssh prod "cd ${APP_DIR} && docker compose exec -T postgres pg_isready -U postgres -d cdnlandings" 2>/dev/null; then
              echo "PostgreSQL is ready."
              break
            fi
            echo "  Attempt $i/30..."
            sleep 2
          done

          ssh prod "cd ${APP_DIR} && docker compose --profile migration up migrate"

      # ─── Rolling deploy (only changed apps) ───
      - name: Rolling deploy
        if: steps.changes.outputs.APPS != ''
        run: |
          for app in ${{ steps.changes.outputs.APPS }}; do
            echo "=== Deploying ${app} ==="
            ssh prod "cd ${APP_DIR} && docker compose up -d --no-deps --force-recreate ${app}"
            echo "Waiting for ${app} health..."
            for i in $(seq 1 30); do
              if ssh prod "cd ${APP_DIR} && docker compose exec -T ${app} wget -q --spider http://127.0.0.1:3000/" 2>/dev/null; then
                echo "${app} is healthy"
                break
              fi
              echo "  Attempt $i/30..."
              sleep 3
            done
          done

      # ─── Nginx reload ───
      - name: Reload nginx
        if: steps.changes.outputs.INFRA == 'true' || steps.changes.outputs.APPS != ''
        run: |
          ssh prod "cd ${APP_DIR} && docker compose up -d --no-deps nginx"
          ssh prod "cd ${APP_DIR} && docker compose exec -T nginx nginx -s reload"

      # ─── Cleanup ───
      - name: Cleanup
        run: |
          rm -rf /tmp/cdn-images
          ssh prod "docker image prune -f"
          echo ""
          echo "=== Deployment Complete ==="
          echo "  Changed apps: ${{ steps.changes.outputs.APPS || 'none' }}"
          echo "  Infra changed: ${{ steps.changes.outputs.INFRA }}"

      - name: Cleanup SSH credentials
        if: always()
        run: rm -rf ~/.ssh/deploy_key ~/.ssh/config
