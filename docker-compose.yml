services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cdnlandings
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL_CDNLANDINGS: postgresql://postgres:postgres@postgres:5432/cdnlandings
    volumes:
      - ./database:/database
    entrypoint: ["/bin/sh", "-c", "cd / && /database/migrate-all.sh"]
    restart: "no"

  cdncore:
    build:
      context: .
      dockerfile: apps/cdncore/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  cdntek:
    build:
      context: .
      dockerfile: apps/cdntek/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  cdntv:
    build:
      context: .
      dockerfile: apps/cdntv/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  cdnglobal:
    build:
      context: .
      dockerfile: apps/cdnglobal/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  aiaccountant:
    build:
      context: .
      dockerfile: apps/aiaccountant/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - cdncore
      - cdntek
      - cdntv
      - cdnglobal
      - aiaccountant
    restart: unless-stopped

volumes:
  pgdata:
